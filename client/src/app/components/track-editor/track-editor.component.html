<div
  class="page-container"
  [style.transform]="'translate(-50%, -50%) scale(' + scale + ')'"
  [attr.data-is-dirty]="isDirtyState() ? 'true' : 'false'"
>
  <app-editor-title
    titleKey="TE_TITLE"
    backRoute="/track-manager"
    [backConfirm]="!isConfigValid() || isDirtyState()"
    [backQueryParams]="{ selectedId: editingTrack?.entity_id }"
    backConfirmTitle="TE_CONFIRM_DISCARD_TITLE"
    backConfirmMessage="TE_CONFIRM_DISCARD_MESSAGE"
    [undoManager]="undoManager"
    [showCopy]="true"
    [isSaving]="isSaving"
    [helpSteps]="getHelpSteps()"
    [helpRecordName]="'trackEditorHelpShown'"
    (copy)="saveAsNew()"
    (back)="onBackClicked()"
  >
  </app-editor-title>

  <div class="content-split">
    <!-- Editor Panel -->
    <div class="editor-panel">
      <div
        id="track-name-section"
        class="editor-section fixed-header"
        [class.invalid]="isNameInvalid"
      >
        <label class="track-name-label">{{
          "TE_TRACK_NAME" | translate
        }}</label>
        <input
          id="track-name-input"
          type="text"
          [(ngModel)]="trackName"
          (focus)="onInputFocus()"
          (blur)="onInputBlur()"
          (ngModelChange)="onInputChange()"
          autocomplete="off"
          data-lpignore="true"
          data-form-type="other"
          name="trackNameInput"
        />
      </div>

      <div id="num-track-sections-section" class="editor-section">
        <label>{{ "TE_NUM_TRACK_SECTIONS" | translate }}</label>
        <input
          id="num-track-sections-input"
          type="number"
          [(ngModel)]="numTrackSections"
          (focus)="onInputFocus()"
          (blur)="onInputBlur()"
          (ngModelChange)="onInputChange()"
          autocomplete="off"
          name="numTrackSectionsInput"
          min="1"
        />
      </div>

      <div class="sections-wrapper">
        <div id="lane-editor-section" class="config-section">
          <div class="section-header" (click)="toggleSection('lanes')">
            <span
              class="expander-icon"
              [class.collapsed]="!sectionsExpanded.lanes"
              >▼</span
            >
            <h1>{{ "TE_LANE_EDITOR" | translate }}</h1>
            <div class="spacer"></div>
            <button
              class="action-btn small add-list-btn"
              (click)="addLane(); $event.stopPropagation()"
            >
              +
            </button>
          </div>

          <div class="section-content" *ngIf="sectionsExpanded.lanes">
            <div
              class="lanes-list"
              cdkDropList
              (cdkDropListDropped)="onLaneDropped($event)"
            >
              <div
                *ngFor="let lane of lanes; let i = index; trackBy: trackByLane"
                class="lane-item"
                cdkDrag
              >
                <div class="lane-actions">
                  <div
                    [id]="'lane-drag-' + i"
                    class="lane-drag-handle"
                    cdkDragHandle
                  >
                    <svg width="24px" fill="currentColor" viewBox="0 0 24 24">
                      <path
                        d="M10 9h4V7h-4v2zm0 4h4v-2h-4v2zm0 4h4v-2h-4v2zm-4-8h4V7H6v2zm0 4h4v-2H6v2zm0 4h4v-2H6v2zm10-8h4V7h-4v2zm0 4h4v-2h-4v2zm0 4h4v-2h-4v2z"
                      ></path>
                    </svg>
                  </div>
                  <button
                    [id]="'lane-delete-' + i"
                    class="action-btn danger small"
                    (click)="removeLane(i)"
                  >
                    X
                  </button>
                </div>

                <div
                  class="lane-preview-badge"
                  [style.background-color]="lane.background_color"
                  [style.color]="lane.foreground_color"
                >
                  <span class="preview-number">#{{ i + 1 }}</span>
                  <input
                    [id]="'lane-length-' + i"
                    type="number"
                    class="preview-length-input"
                    [ngModel]="lane.length"
                    (change)="updateLaneLength(i, $any($event.target).value)"
                    (focus)="onInputFocus()"
                    (blur)="onInputBlur()"
                  />
                </div>

                <div class="lane-controls">
                  <div class="control-group">
                    <input
                      [id]="'lane-bg-' + i"
                      type="color"
                      [ngModel]="lane.background_color"
                      (ngModelChange)="updateLaneBackgroundColor(i, $event)"
                      (focus)="onInputFocus()"
                      (blur)="onInputBlur()"
                    />
                    <label>{{ "TE_BACKGROUND_COLOR" | translate }}</label>
                  </div>

                  <div class="control-group">
                    <input
                      [id]="'lane-fg-' + i"
                      type="color"
                      [ngModel]="lane.foreground_color"
                      (ngModelChange)="updateLaneForegroundColor(i, $event)"
                      (focus)="onInputFocus()"
                      (blur)="onInputBlur()"
                    />
                    <label>{{ "TE_FOREGROUND_COLOR" | translate }}</label>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="config-section">
          <div class="section-header" (click)="toggleSection('interfaces')">
            <span
              class="expander-icon"
              [class.collapsed]="!sectionsExpanded.interfaces"
              >▼</span
            >
            <h1>{{ "TE_INTERFACES" | translate }}</h1>
          </div>

          <div class="section-content" *ngIf="sectionsExpanded.interfaces">
            <div class="editor-section">
              <div
                class="section-header"
                style="
                  cursor: default;
                  background: transparent;
                  padding-left: 0;
                  min-height: auto;
                  margin-bottom: 0;
                "
              >
                <span
                  style="
                    font-size: 1.1rem;
                    color: #94a3b8;
                    font-weight: 600;
                    text-transform: uppercase;
                  "
                  >Arduino</span
                >
                <div class="spacer"></div>
                <button
                  id="add-interface-btn"
                  class="action-btn small add-list-btn"
                  (click)="addArduinoConfig(); $event.stopPropagation()"
                >
                  +
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="editor-actions">
        <div class="spacer"></div>
      </div>
    </div>

    <!-- Track Interface Visualization -->
    <div class="rhs-interface-wrapper">
      <div
        class="preview-panel"
        [style.overflow-y]="arduinoConfigs.length > 0 ? 'auto' : 'hidden'"
      >
        <div *ngIf="arduinoConfigs.length === 0" class="empty-state">
          <h3>{{ "TE_NO_INTERFACES_ADDED" | translate }}</h3>
          <p>{{ "TE_NO_INTERFACES_DESC" | translate }}</p>
        </div>

        <div
          class="interface-container"
          *ngFor="
            let config of arduinoConfigs;
            let i = index;
            trackBy: trackByArduinoConfig
          "
        >
          <app-arduino-editor
            [config]="config"
            [lanes]="lanes"
            (configChange)="captureState()"
            [index]="i"
            [count]="arduinoConfigs.length"
            (remove)="removeArduinoConfig(i)"
            (requestLedStringDialog)="onRequestLedStringDialog(i)"
          >
          </app-arduino-editor>
        </div>
      </div>

      <app-input-dialog
        [visible]="showLedStringDialog"
        [title]="'AE_ADD_LED_STRING_TITLE'"
        [message]="'AE_ADD_LED_STRING_MSG'"
        [type]="'number'"
        [min]="1"
        [initialValue]="1"
        (confirm)="onLedStringDialogConfirm($event)"
        (cancel)="onLedStringDialogCancel()"
      >
      </app-input-dialog>
    </div>
  </div>
</div>

<!-- Loading Overlay -->
<div class="loader-overlay" *ngIf="isLoading || (isSaving && !isAutoSaving)">
  <div class="spinner"></div>
</div>
