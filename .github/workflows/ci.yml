name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: cd client && npm install --legacy-peer-deps
      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Generate Protobufs
        run: cd server && chmod +x generate_protos.sh && ./generate_protos.sh
      - name: Run client tests
        run: cd client && npm run test --watch=false

  test-visual:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: cd client && npm install --legacy-peer-deps
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('client/package-lock.json') }}
      - name: Install Playwright Browsers
        run: cd client && npx playwright install --with-deps
      - name: Install Protoc
        run: brew install protobuf
      - name: Generate Protobufs
        run: cd server && chmod +x generate_protos.sh && ./generate_protos.sh
      - name: Run visual tests
        run: cd client && npx playwright test

  test-server:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: cd client && npm install --legacy-peer-deps
      - name: Install LibSSL 1.1 (for MongoDB)
        run: |
          wget http://archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2_amd64.deb
      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Generate Protobufs
        # Match local environment exactly by running the generation script first
        run: |
          cd server
          chmod +x generate_protos.sh
          ./generate_protos.sh
      - name: Build and test with Maven
        # skipProtobuf=true since we just generated them with the script
        run: |
          cd server
          mvn test -DskipProtobuf=true \
                   -Dde.flapdoodle.embed.mongo.artifacts=/tmp/.embedmongo \
                   -Djava.io.tmpdir=/tmp
