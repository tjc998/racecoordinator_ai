syntax = "proto3";
package com.antigravity;

option java_package = "com.antigravity.proto";
option java_multiple_files = true;
option java_outer_classname = "RotationModelProto";

message CustomRotation {
  int32 num_drivers = 1;
  repeated CustomHeat heats = 2;
}

message CustomHeat {
  repeated int32 driver_indices = 1;
  int32 group = 2;
}
