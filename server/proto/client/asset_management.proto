syntax = "proto3";
package com.antigravity;

import "client/rotation_model.proto";
import "client/asset_model.proto";

option java_package = "com.antigravity.proto";
option java_multiple_files = true;
option java_outer_classname = "AssetManagementProto";

message ListAssetsRequest {
  // Empty request
}

message UploadAssetRequest {
  string name = 1;
  string type = 2; // "image" or "sound"
  bytes data = 3;
}

message DeleteAssetRequest {
  string id = 1;
}

message RenameAssetRequest {
  string id = 1;
  string new_name = 2;
}

message SaveImageSetRequest {
  string id = 1; // Optional, for editing existing sets
  string name = 2;
  repeated SaveImageSetEntry entries = 3;
}

message SaveImageSetEntry {
  string name = 1;
  int32 percentage = 2;
  string url = 3;   // Used if referencing an already uploaded image
  bytes data = 4;  // Used if uploading a new image as part of the set
}

message SaveAudioSetRequest {
  string id = 1; // Optional, for editing existing sets
  string name = 2;
  repeated SaveAudioSetEntry entries = 3;
}

message SaveAudioSetEntry {
  string name = 1;
  float time_seconds = 2;
  string url = 3;   // Used if referencing an already uploaded sound
  bytes data = 4;  // Used if uploading a new sound as part of the set
}


message SaveCustomRotationRequest {
  string id = 1; // Optional, for editing existing sets
  string name = 2;
  int32 num_lanes = 3;
  repeated CustomRotation rotations = 4;
}

message SaveCustomRotationResponse {
  bool success = 1;
  string message = 2;
  AssetMessage asset = 3;
}
