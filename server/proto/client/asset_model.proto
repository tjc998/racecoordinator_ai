syntax = "proto3";
package com.antigravity;

import "client/model.proto";
import "client/rotation_model.proto";

option java_package = "com.antigravity.proto";
option java_multiple_files = true;
option java_outer_classname = "AssetModelProto";

message ImageSetEntry {
  string url = 1;
  int32 percentage = 2;
  string name = 3;
  string size = 4;
}

message AudioSetEntry {
  string url = 1;
  float time_seconds = 2;
  string name = 3;
  string size = 4;
}

message AssetMessage {
  Model model = 1;
  string name = 2;
  string type = 3; // "image", "sound", "image_set", "audio_set", or "custom_rotation"
  string size = 4; // Human readable size e.g. "2.4 MB"
  string url = 5;  // URL for the client to fetch the file (or main/first image in set)
  repeated ImageSetEntry images = 6;
  repeated AudioSetEntry audio_entries = 7;
  int32 num_lanes = 8;
  repeated CustomRotation custom_rotations = 9;
}
