syntax = "proto3";
package com.antigravity;

import "server/race_participant.proto";
import "client/driver_model.proto";

option java_package = "com.antigravity.proto";
option java_multiple_files = true;
option java_outer_classname = "DriverHeatDataProto";

message LapData {
  double lap_time = 1;
  string driver_id = 2;
  bool is_drift = 3;
}

message DriverHeatData {
  RaceParticipant driver = 1;
  string object_id = 2;
  string driver_id = 3;
  DriverModel actual_driver = 4;
  double gap_leader = 5;
  double gap_position = 6;
  repeated double segments = 7;
  repeated LapData laps = 8;
  double penalty_laps = 9;
  double user_laps = 10;
  double auto_calculated_laps = 11;
  double adjusted_lap_count = 12;
  double average_lap_time = 13;
  double median_lap_time = 14;
  double best_lap_time = 15;
  double reaction_time = 16;
  bool is_refueling = 17;
  int32 current_location = 18;
  double initial_fuel_level = 19;
}

